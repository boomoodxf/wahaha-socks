name: Release Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: echo "version=$(npm run bump:version --silent)" >> "$GITHUB_OUTPUT"

      - name: Sync Android
        run: npm run android --silent

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_FILE: release.keystore
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          cp "$APK_PATH" "release-artifacts/wahaha-release-${{ steps.bump.outputs.version }}.apk"

      - name: Create git tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add package.json android/app/build.gradle package-lock.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }}" || true
          git tag "v${{ steps.bump.outputs.version }}"
          git push
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          files: release-artifacts/wahaha-release-${{ steps.bump.outputs.version }}.apk
          generate_release_notes: true
